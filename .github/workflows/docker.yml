name: Build, Push, Deploy Tenant CMS MovieHub

on:
  push:
    branches: ['main']

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tenant-moviehub:latest
          build-args: |
            NEXT_PUBLIC_NODE_ENV=${{ secrets.NEXT_PUBLIC_NODE_ENV }}
            NEXT_PUBLIC_API_META_ENDPOINT_URL=${{ secrets.NEXT_PUBLIC_API_META_ENDPOINT_URL }}
            NEXT_PUBLIC_API_TENANT_ENDPOINT_URL=${{ secrets.NEXT_PUBLIC_API_TENANT_ENDPOINT_URL }}
            NEXT_PUBLIC_API_MEDIA_URL=${{ secrets.NEXT_PUBLIC_API_MEDIA_URL }}
            NEXT_PUBLIC_APP_USERNAME=${{ secrets.NEXT_PUBLIC_APP_USERNAME }}
            NEXT_PUBLIC_APP_PASSWORD=${{ secrets.NEXT_PUBLIC_APP_PASSWORD }}
            NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}
            NEXT_PUBLIC_TINYMCE_URL=${{ secrets.NEXT_PUBLIC_TINYMCE_URL }}
            NEXT_PUBLIC_API_SOCKET=${{ secrets.NEXT_PUBLIC_API_SOCKET }}
            NEXT_PUBLIC_GRANT_TYPE=${{ secrets.NEXT_PUBLIC_GRANT_TYPE }}
            NEXT_PUBLIC_TENANT_ID=${{ secrets.NEXT_PUBLIC_TENANT_ID }}
            NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_GRANT_TYPE_REFRESH_TOKEN=${{ secrets.NEXT_PUBLIC_GRANT_TYPE_REFRESH_TOKEN }}
            NEXT_PUBLIC_MEDIA_HOST=${{ secrets.NEXT_PUBLIC_MEDIA_HOST }}
            NEXT_PUBLIC_CLIENT_TYPE=${{ secrets.NEXT_PUBLIC_CLIENT_TYPE }}

      - name: Show Image Size
        run: docker images ${{ secrets.DOCKER_USERNAME }}/tenant-moviehub:latest

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/tenant-moviehub:latest

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn

      - name: Setup VPN
        run: |
          echo "${{ secrets.VPN_KEY }}" > vpn.ovpn
          echo "${{ secrets.VPN_USERNAME }}" > auth.txt
          echo "${{ secrets.VPN_PASSWORD }}" >> auth.txt

      - name: Connect VPN
        run: |
          sudo openvpn --config vpn.ovpn --auth-user-pass auth.txt --daemon
          sleep 20

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'

            docker pull ${{ secrets.DOCKER_USERNAME }}/tenant-moviehub:latest

            docker stop tenant-moviehub || true
            docker rm tenant-moviehub || true

            docker run -d \
              -p 3001:3001 \
              --restart unless-stopped \
              --name tenant-moviehub \
              ${{ secrets.DOCKER_USERNAME }}/tenant-moviehub:latest

          EOF

      - name: Notify Discord (Success)
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "✅ Deploy thành công!" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg sha "${COMMIT_SHA:0:7}" \
            --arg commit_url "$SERVER_URL/$REPO/commit/$COMMIT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg ts "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                color: 3066993,
                fields: [
                  { name: "📦 Project", value: "tenant-moviehub", inline: true },
                  { name: "🌿 Branch",  value: $branch,       inline: true },
                  { name: "👤 Author",  value: $actor,        inline: true },
                  { name: "📝 Commit",  value: ("[`\($sha)`](\($commit_url))"), inline: false },
                  { name: "💬 Message", value: $msg,          inline: false }
                ],
                footer: { text: "GitHub Actions" },
                timestamp: $ts
              }]
            }')
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord (Failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "❌ Deploy thất bại!" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg sha "${COMMIT_SHA:0:7}" \
            --arg commit_url "$SERVER_URL/$REPO/commit/$COMMIT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg logs_url "$SERVER_URL/$REPO/actions/runs/$RUN_ID" \
            --arg ts "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                color: 15158332,
                fields: [
                  { name: "📦 Project", value: "fe-moviehub", inline: true },
                  { name: "🌿 Branch",  value: $branch,       inline: true },
                  { name: "👤 Author",  value: $actor,        inline: true },
                  { name: "📝 Commit",  value: ("[`\($sha)`](\($commit_url))"), inline: false },
                  { name: "💬 Message", value: $msg,          inline: false },
                  { name: "🔗 Logs",    value: ("[View Logs](\($logs_url))"),   inline: false }
                ],
                footer: { text: "GitHub Actions" },
                timestamp: $ts
              }]
            }')
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
